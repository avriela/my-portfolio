<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Анастасия Дубина — QA Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #f5f0eb;
      color: #2c2825;
    }

    /* ===== БОКОВОЕ МЕНЮ ===== */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: #1c1c1e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
      padding-bottom: 24px;
    }

    .sidebar-header {
      padding: 32px 24px 24px;
      border-bottom: 1px solid #2e2e30;
    }

    .sidebar-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8c97e, #c4a45a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 12px;
    }

    .sidebar-name {
      font-size: 15px;
      font-weight: 600;
      color: #f0ece4;
      line-height: 1.3;
    }

    .sidebar-role {
      font-size: 12px;
      color: #9a9088;
      margin-top: 4px;
    }

    .sidebar-nav {
      padding: 16px 0;
      flex: 1;
    }

    /* Пункт меню */
    .nav-item {
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      padding: 10px 24px;
      font-size: 15px;
      color: #9a9088;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
      position: relative;
    }

    .nav-item:hover {
      color: #f0ece4;
      background: #242424;
    }

    .nav-item.active {
      color: #e8c97e;
      background: #242424;
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #e8c97e;
      border-radius: 0 2px 2px 0;
    }

    .nav-item .icon {
      font-size: 15px;
      width: 20px;
      text-align: center;
    }

    /* Категория в меню */
    .nav-category {
      padding: 16px 24px 6px;
      font-size: 12px;
      font-weight: 700;
      color: #a08845;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* Аккордеон */
    .nav-accordion-header {
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      padding: 10px 24px;
      font-size: 15px;
      color: #9a9088;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .nav-accordion-header:hover {
      color: #f0ece4;
      background: #242424;
    }

    .nav-accordion-header.open {
      color: #f0ece4;
    }

    .nav-accordion-arrow {
      margin-left: auto;
      font-size: 10px;
      transition: transform 0.2s;
      color: #5a5450;
    }

    .nav-accordion-header.open .nav-accordion-arrow {
      transform: rotate(180deg);
    }

    .nav-accordion-body {
      display: none;
      background: #161618;
    }

    .nav-accordion-body.open {
      display: block;
    }

    .nav-sub-item {
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      padding: 8px 24px 8px 52px;
      font-size: 14px;
      color: #6a6460;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      position: relative;
    }

    .nav-sub-item:hover {
      color: #f0ece4;
    }

    .nav-sub-item.active {
      color: #e8c97e;
    }

    .nav-sub-item.active::before {
      content: '';
      position:
        absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #e8c97e;
      border-radius: 0 2px 2px 0;
    }

    /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
    .main {
      flex: 1;
      overflow-y: auto;
      background: linear-gradient(160deg, #f5f0eb 0%, #ede8e0 100%);
    }

    .content-block {
      display: none;
      padding: 48px 56px;
      max-width: 860px;
      animation: fadeIn 0.25s ease;
    }

    .content-block.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Заголовки */
    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: #2c2825;
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 14px;
      color: #9a9088;
      margin-bottom: 36px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #c4a45a;
      margin-bottom: 16px;
      margin-top: 36px;
    }

    .section-title:first-of-type {
      margin-top: 0;
    }

    /* Карточки */
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(44, 40, 37, 0.07);
      border: 1px solid #ede8e0;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #2c2825;
      margin-bottom: 8px;
    }

    .card-text {
      font-size: 13px;
      color: #7a7068;
      line-height: 1.7;
    }

    /* Теги */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      background: #f5f0eb;
      border: 1px solid #e0d8ce;
      color: #7a7068;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .tag.gold {
      background: #fdf6e3;
      border-color: #e8c97e;
      color: #c4a45a;
    }

    /* Список */
    .check-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .check-list li {
      font-size: 13px;
      color: #5a5450;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.6;
    }

    .check-list li::before {
      content: '✦';
      color: #e8c97e;
      font-size: 10px;
      margin-top: 3px;
      flex-shrink: 0;
    }

    /* Кнопка */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
    }

    .btn-gold {
      background: #e8c97e;
      color: #1c1c1e;
    }

    .btn-gold:hover {
      background: #d4b56a;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #e0d8ce;
      color: #7a7068;
    }

    .btn-outline:hover {
      border-color: #e8c97e;
      color: #c4a45a;
    }

    /* Инфо строки */
    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #ede8e0;
      font-size: 13px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #9a9088;
      width: 140px;
      flex-shrink: 0;
    }

    .info-value {
      color: #2c2825;
    }

    /* Проект */
    .project-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(44, 40, 37, 0.07);
      border: 1px solid #ede8e0;
    }

    .project-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 16px;
    }

    .project-title {
      font-size: 16px;
      font-weight: 600;
      color: #2c2825;
    }

    .project-type {
      font-size: 11px;
      color
      : #c4a45a;
      background: #fdf6e3;
      border: 1px solid #e8c97e;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .project-text {
      font-size: 13px;
      color: #7a7068;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .project-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #ede8e0;
      margin: 28px 0;
    }

    /* About hero */
    .about-hero {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 36px;
    }

    .about-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8c97e, #c4a45a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
      color: #1c1c1e;
      flex-shrink: 0;
    }

    .about-intro-name {
      font-size: 24px;
      font-weight: 700;
      color: #2c2825;
    }

    .about-intro-role {
      font-size: 14px;
      color: #9a9088;
      margin-top: 4px;
    }

    .about-intro-location {
      font-size: 12px;
      color: #b0a898;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Скроллбар */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #d4ccc4;
      border-radius: 3px;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: #2e2e30;
    }
  </style>
</head>
<body>

<!-- ===== БОКОВОЕ МЕНЮ ===== -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-avatar">АД</div>
    <div class="sidebar-name">Анастасия Дубина</div>
    <div class="sidebar-role">QA Engineer</div>
  </div>

  <nav class="sidebar-nav">

    <div class="nav-category">Главное</div>

    <button class="nav-item active" onclick="showPage('about')">
      <span class="icon">👤</span> О себе
    </button>

    <button class="nav-item" onclick="showPage('skills')">
      <span class="icon">⚡</span> Навыки
    </button>

    <button class="nav-item" onclick="showPage('contacts')">
      <span class="icon">✉️</span> Контакты
    </button>

    <div class="nav-category">Проекты</div>

    <!-- Боты -->
    <button class="nav-accordion-header" onclick="toggleAccordion(this)">
      <span class="icon">🤖</span> Боты
      <span class="nav-accordion-arrow">▼</span>
    </button>
    <div class="nav-accordion-body">
      <button class="nav-sub-item" onclick="showPage('bot-reports')">
